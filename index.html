<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
<title>個人スペース</title>
</head>
<body>

<div class="container">
  <h1>マイスペースへ移動</h1>

  <div class="admin-area">
    <button class="admin-btn" onclick="adminLogin()">ログイン</button>
  </div>
</div>

<script>
function adminLogin() {
  const p = prompt("ログインパスワード");
  if (p === "0520") {
    sessionStorage.setItem("admin", "1");
    location.href = "home.html";
  } else {
    alert("パスワードが違います");
  }
}
</script>

</body>
</html>
